version: "3.8"

services:
  ship-tracker:
    build: .
    container_name: ship-tracker
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # Werte werden aus den Portainer Environment Variables bezogen.
      # In Portainer → Stack → Environment variables eintragen:
      #   AISSTREAM_API_KEY = <dein Key von aisstream.io>
      #   PERSON_NAME       = Lara
      - AISSTREAM_API_KEY=${AISSTREAM_API_KEY}
      - PERSON_NAME=${PERSON_NAME:-Lara}
